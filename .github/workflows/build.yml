# Datei: .github/workflows/build.yml

name: Build NovaTeams

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Maven Berechtigungen setzen
        run: chmod +x mvnw || true

      - name: Abhängigkeiten herunterladen
        run: mvn dependency:resolve

      - name: Projekt kompilieren
        run: mvn clean package

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: NovaTeams
          path: target/*.jar
